name: codex-review-override

on:
  issue_comment:
    types:
      - created
      - edited

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  override:
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/codex-override') }}
    uses: trycourier/github-workflows/.github/workflows/codex-review-override.yml@v1
