name: Auto-approve doc-only PRs

# Temporarily disabled — uncomment `on` below and remove workflow_dispatch to re-enable.
# on:
#   pull_request:
#     types: [opened, synchronize, reopened, ready_for_review]
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve-docs:
    uses: trycourier/github-workflows/.github/workflows/auto-approve-docs.yml@v1
    permissions:
      contents: read
      pull-requests: write
    with:
      docs_prefixes_json: '["docs/"]'
      docs_extensions_json: '[".md"]'
      skip_draft_prs: true
