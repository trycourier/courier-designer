name: codex-pr-review

# Temporarily disabled — uncomment `on` below and remove workflow_dispatch to re-enable.
# on:
#   pull_request:
#     types:
#       - opened
#       - synchronize
#       - reopened
#       - ready_for_review
#     branches:
#       - main
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    uses: trycourier/github-workflows/.github/workflows/codex-pr-review.yml@v1
    with:
      runs_on_json: '["ubuntu-latest"]'
      install_codex_cli: true
      review_reasoning_effort: high
      max_inline_comments: "10"
    secrets:
      codex_auth_json: ${{ secrets.CODEX_AUTH_JSON }}
